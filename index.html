<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谁的星空</title>
<style>
  /* --- 极致深邃暗黑背景 --- */
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, #0a1118 0%, #030508 60%, #000000 100%);
    background-color: #000000;
    color: white;
    font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  /* --- 全屏交互画布 (底层，绝不挡点击) --- */
  #particle-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    pointer-events: none; 
  }

  /* --- 底部平滑起伏的超细长频谱 --- */
  #visualizer-container {
    position: absolute;
    bottom: 0; left: 0;
    width: 100vw; height: 30vh; 
    display: flex; align-items: flex-end; justify-content: center; gap: 3px; 
    z-index: 1;
    pointer-events: none;
  }

  .bar {
    width: 3px;
    background: linear-gradient(to top, rgba(255, 160, 175, 0.1), rgba(255, 160, 175, 0.9)); 
    border-radius: 3px 3px 0 0;
    transform-origin: bottom;
    box-shadow: 0 0 15px rgba(255, 160, 175, 0.4);
  }

  /* --- BGM 控制器 --- */
  #bgm-toggle {
    position: absolute;
    top: 30px; right: 30px;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 8px 18px 8px 12px; border-radius: 30px;
    color: #ffffff; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: all 0.4s;
    pointer-events: auto; 
  }
  .cd-icon { font-size: 16px; display: inline-block; animation: spin 4s linear infinite; }
  #bgm-toggle.paused .cd-icon { animation-play-state: paused; filter: grayscale(100%) opacity(0.5); }
  #bgm-toggle.paused { background: rgba(0, 0, 0, 0.4); border-color: rgba(255, 255, 255, 0.2); }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* --- 右下角悬浮上传歌按钮 --- */
  .contribute-btn {
    position: fixed;
    bottom: 30px; right: 30px;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 12px 24px; border-radius: 30px;
    font-size: 13px; letter-spacing: 1px; color: #ffffff;
    text-decoration: none; display: flex; align-items: center; gap: 8px;
    transition: all 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    pointer-events: auto;
  }
  .contribute-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* --- 泡泡区域 --- */
  #bubble-container {
    position: absolute;
    top: 35vh; 
    left: 0;
    width: 100vw; height: 65vh; 
    z-index: 5;
    pointer-events: none; 
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(100% 100% at 30% 30%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 100%);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: inset 2px 2px 10px rgba(255, 255, 255, 0.5), 0 4px 20px rgba(255, 255, 255, 0.15);
    display: flex; align-items: center; justify-content: center; text-align: center;
    cursor: pointer; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    animation: float infinite ease-in-out;
    pointer-events: auto; 
  }
  .bubble:hover {
    transform: scale(1.1) translateY(-10px) !important;
    background: radial-gradient(100% 100% at 30% 30%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 100%);
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-shadow: inset 2px 2px 15px rgba(255, 255, 255, 0.6), 0 10px 30px rgba(255, 255, 255, 0.3);
    z-index: 100;
  }
  .bubble.playing {
    background: radial-gradient(100% 100% at 30% 30%, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 100%);
    border-color: rgba(255, 255, 255, 0.9);
    box-shadow: inset 2px 2px 15px rgba(255, 255, 255, 0.8), 0 0 50px rgba(255, 255, 255, 0.4);
    animation: pulse-3d 2.5s infinite;
  }
  
  /* 更新了标题和贡献者的样式 */
  .bubble .title { 
    font-size: 14px; font-weight: 500; letter-spacing: 1px; 
    color: #ffffff; 
    text-shadow: 0 2px 4px rgba(0,0,0,1), 0 0 10px rgba(255,255,255,0.4); 
    pointer-events: none; padding: 8px; line-height: 1.2; 
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .bubble .contributor { 
    display: block; /* 核心修改：让 from xxx 显示出来 */
    font-size: 11px; 
    color: rgba(255,255,255,0.8); 
    margin-top: 4px;
    font-weight: normal;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }

  @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } 100% { transform: translateY(0px) rotate(0deg); } }
  @keyframes pulse-3d { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: inset 2px 2px 10px rgba(255, 255, 255, 0.6), inset -5px -5px 15px rgba(0, 0, 0, 0.4), 0 0 50px rgba(255, 255, 255, 0.2); } 100% { transform: scale(1); } }

  /* --- 底部播放器 --- */
  #player {
    position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%);
    background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    padding: 15px 30px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 -10px 50px rgba(0,0,0,0.8); transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 200; width: 80%; max-width: 400px;
  }
  #player.active { bottom: 30px; }
  #now-playing { font-size: 14px; color: #ffffff; font-weight: bold; letter-spacing: 2px; }
  #contributor-tag { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: -6px; letter-spacing: 1px; }
  audio { width: 100%; height: 35px; outline: none; opacity: 0.9; }

  .music-note { position: absolute; font-size: 20px; color: rgba(255, 180, 180, 0.9); pointer-events: none; animation: floatUp 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; z-index: 50; text-shadow: 0 0 15px rgba(255, 180, 180, 0.9); }
  @keyframes floatUp { 0% { opacity: 0; transform: translateY(0) scale(0.8); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-150px) scale(1.2); } }

  @media (max-width: 768px) {
    #bgm-toggle { top: 20px; right: 20px; padding: 6px 12px; font-size: 11px; }
    .contribute-btn { bottom: 20px; right: 20px; padding: 10px 16px; font-size: 12px; }
    #player.active { bottom: 80px; }
  }
</style>
</head>
<body>

<audio id="bgm-element" src="https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview112/v4/43/4e/ce/434ecece-62a0-04fc-8898-55e91c5f3e75/mzaf_1137360759286248328.plus.aac.p.m4a" loop></audio>

<div id="bgm-toggle" class="paused">
  <span class="cd-icon">💿</span>
  <span id="bgm-text">BGM: If - Bread</span>
</div>

<!-- ★ 全屏流体星云画布 (蜡笔小新专属) -->
<canvas id="particle-canvas"></canvas>

<!-- 底部频谱 -->
<div id="visualizer-container"></div>

<!-- 右下角提交歌曲 -->
<a href="https://github.com/CZ-186/Lao-Wang-s-House2/upload/main/audio" target="_blank" class="contribute-btn">
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  <span>上传歌</span>
</a>

<div id="bubble-container"></div>

<div id="player">
  <div id="now-playing">STANDBY</div>
  <div id="contributor-tag"></div>
  <audio id="audio-element" controls></audio>
</div>

<script>
  let currentBubble = null; 
  let isBubblePlaying = false; 
  let isBgmPlaying = false; 
  let hasUserInteracted = false;

  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];
  const mouse = { x: -1000, y: -1000, radius: 100 }; 

  function getShinchanPoints() {
    const oc = document.createElement('canvas');
    const sizeX = 400; const sizeY = 400;
    oc.width = sizeX; oc.height = sizeY;
    const octx = oc.getContext('2d', {willReadFrequently: true});
    
    octx.translate(40, 50);
    octx.fillStyle = '#c74c43'; 
    octx.beginPath(); octx.moveTo(90, 180); octx.lineTo(260, 230); octx.lineTo(260, 320); octx.lineTo(50, 320); octx.fill();
    octx.strokeStyle = '#416675'; octx.lineWidth = 8; octx.beginPath(); octx.moveTo(170, 200); octx.lineTo(260, 300); octx.stroke();
    octx.strokeStyle = '#fde2c9'; octx.lineWidth = 18; octx.lineCap = 'round'; octx.lineJoin = 'round';
    octx.beginPath(); octx.moveTo(130, 200); octx.lineTo(60, 130); octx.stroke();
    octx.lineWidth = 10; octx.beginPath(); octx.moveTo(60, 130); octx.lineTo(40, 80); octx.stroke(); 
    octx.beginPath(); octx.moveTo(60, 130); octx.lineTo(75, 85); octx.stroke(); 
    octx.fillStyle = '#fde2c9'; octx.beginPath(); octx.arc(50, 130, 15, 0, Math.PI*2); octx.fill(); 
    octx.beginPath(); octx.ellipse(230, 150, 95, 65, 0.1, 0, Math.PI*2); octx.fill();
    octx.beginPath(); octx.ellipse(150, 110, 65, 60, -0.2, 0, Math.PI*2); octx.fill();
    octx.fillStyle = '#262322'; octx.beginPath(); octx.ellipse(140, 70, 40, 25, -0.2, 0, Math.PI*2); octx.fill();
    octx.beginPath(); octx.ellipse(200, 70, 40, 25, 0.1, 0, Math.PI*2); octx.fill();
    octx.strokeStyle = '#262322'; octx.lineWidth = 14; octx.beginPath(); octx.moveTo(100, 100); octx.quadraticCurveTo(120, 75, 145, 95); octx.stroke();
    octx.beginPath(); octx.moveTo(180, 100); octx.quadraticCurveTo(205, 80, 230, 95); octx.stroke();
    octx.lineWidth = 4; octx.beginPath(); octx.moveTo(105, 125); octx.quadraticCurveTo(115, 115, 125, 125); octx.quadraticCurveTo(135, 135, 145, 125); octx.stroke();
    octx.beginPath(); octx.moveTo(195, 130); octx.quadraticCurveTo(210, 120, 225, 130); octx.stroke();
    octx.fillStyle = '#ff929e'; octx.beginPath(); octx.ellipse(140, 155, 15, 8, -0.1, 0, Math.PI*2); octx.fill();
    octx.beginPath(); octx.ellipse(245, 160, 18, 9, 0.1, 0, Math.PI*2); octx.fill();
    octx.fillStyle = '#f56272'; octx.beginPath(); octx.arc(135, 155, 2, 0, Math.PI*2); octx.fill();
    octx.beginPath(); octx.arc(145, 155, 2, 0, Math.PI*2); octx.fill();
    octx.beginPath(); octx.arc(240, 160, 2, 0, Math.PI*2); octx.fill();
    octx.beginPath(); octx.arc(250, 160, 2, 0, Math.PI*2); octx.fill();
    octx.fillStyle = '#262322'; octx.beginPath(); octx.ellipse(265, 185, 4, 3, -0.2, 0, Math.PI*2); octx.fill();

    try {
      const data = octx.getImageData(0,0,sizeX,sizeY).data;
      const points = [];
      const step = 3; 
      for(let y=0; y<sizeY; y+=step) {
        for(let x=0; x<sizeX; x+=step) {
          const alpha = data[(y*sizeX+x)*4+3];
          if(alpha > 30) { 
            const r = data[(y*sizeX+x)*4]; const g = data[(y*sizeX+x)*4+1]; const b = data[(y*sizeX+x)*4+2];
            points.push({ x: x - sizeX/2, y: y - sizeY/2, colorBase: `rgba(${r},${g},${b},` }); 
          }
        }
      }
      return points;
    } catch(e) { return []; }
  }

  function initCanvas() {
    width = canvas.clientWidth; height = canvas.clientHeight;
    canvas.width = width * window.devicePixelRatio; canvas.height = height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    
    particles = [];
    const shapePoints = getShinchanPoints();
    const scale = Math.min(width / 600, height / 700, 1.2); 
    const centerX = width / 2;
    const centerY = height * 0.25; 

    shapePoints.forEach(p => {
      if (Math.random() > 0.65) return; 
      particles.push({
        x: centerX + (Math.random()-0.5)*200, y: centerY + (Math.random()-0.5)*200,
        originX: centerX + p.x * scale, originY: centerY + p.y * scale,
        vx: 0, vy: 0, size: Math.random() * 1.5 + 0.5, 
        color: `${p.colorBase}${0.5 + Math.random()*0.5})`, isAmbient: false
      });
    });

    for(let i=0; i<800; i++) {
      particles.push({
        x: Math.random() * width, y: Math.random() * height,
        originX: Math.random() * width, originY: Math.random() * height,
        vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
        size: Math.random() * 1.5 + 0.1,
        color: `rgba(255, 200, 200, ${0.05 + Math.random()*0.2})`, isAmbient: true
      });
    }
  }

  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
  window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive: true});
  window.addEventListener('touchend', () => { mouse.x = -1000; mouse.y = -1000; });

  function animateParticles() {
    ctx.clearRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'lighter';
    
    for(let i=0; i<particles.length; i++) {
      let p = particles[i];
      let dx = mouse.x - p.x; let dy = mouse.y - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      
      if(dist < mouse.radius) {
        let force = (mouse.radius - dist) / mouse.radius;
        p.vx -= (dx / dist) * force * 1.5; p.vy -= (dy / dist) * force * 1.5;
      }
      
      if(p.isAmbient) {
        p.x += p.vx; p.y += p.vy;
        if(p.x < 0 || p.x > width) p.vx *= -1;
        if(p.y < 0 || p.y > height) p.vy *= -1;
      } else {
        p.vx += (p.originX - p.x) * 0.03; p.vy += (p.originY - p.y) * 0.03;
        p.vx *= 0.82; p.vy *= 0.82; 
        p.x += p.vx; p.y += p.vy;
      }
      
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    requestAnimationFrame(animateParticles);
  }

  initCanvas();
  animateParticles();
  window.addEventListener('resize', initCanvas);

  const visualizerContainer = document.getElementById('visualizer-container');
  const numBars = Math.floor(window.innerWidth / 6); 
  const bars = [];
  const targetHeights = new Array(numBars).fill(10);
  const currentHeights = new Array(numBars).fill(10);

  for (let i = 0; i < numBars; i++) {
    const bar = document.createElement('div'); bar.className = 'bar';
    visualizerContainer.appendChild(bar); bars.push(bar);
  }

  function generateTargets() {
    const isAnyPlaying = isBubblePlaying || isBgmPlaying;
    const isBassHit = isAnyPlaying && Math.random() > 0.6; 
    for (let i = 0; i < numBars; i++) {
      if (!isAnyPlaying) {
        targetHeights[i] = 5 + Math.random() * 10;
      } else {
        const centerFactor = 1 - Math.abs((i / numBars) - 0.5) * 2;
        let baseHeight = 10 + Math.random() * 30;
        if (isBassHit) baseHeight += Math.random() * 150 * Math.pow(centerFactor, 1.5);
        targetHeights[i] = baseHeight;
      }
    }
    setTimeout(generateTargets, isAnyPlaying ? 350 : 1000); 
  }
  generateTargets();

  function renderVisualizer() {
    for (let i = 0; i < numBars; i++) {
      currentHeights[i] += (targetHeights[i] - currentHeights[i]) * 0.15;
      bars[i].style.height = currentHeights[i] + 'px';
      const opacity = 0.3 + (currentHeights[i] / 200) * 0.7;
      bars[i].style.opacity = opacity;
    }
    requestAnimationFrame(renderVisualizer);
  }
  renderVisualizer();

  const container = document.getElementById('bubble-container');
  const player = document.getElementById('player');
  const audioElement = document.getElementById('audio-element');
  const nowPlaying = document.getElementById('now-playing');
  const contributorTag = document.getElementById('contributor-tag');
  const bgmElement = document.getElementById('bgm-element');
  const bgmToggle = document.getElementById('bgm-toggle');
  const bgmText = document.getElementById('bgm-text');

  fetch('./playlist.json')
    .then(response => response.json())
    .then(data => {
      setTimeout(() => {
        initBubbles(data);
      }, 100); 
    })
    .catch(error => console.error('Error loading playlist:', error)); 

  function initBubbles(songs) {
    container.innerHTML = '';
    const placedPos = [];
    
    function getSafePos(size) {
      const paddingX = 30, paddingY = 30, containerWidth = window.innerWidth, startY = 10, containerHeight = window.innerHeight * 0.6;
      for (let attempts = 0; attempts < 150; attempts++) {
        const x = paddingX + Math.random() * (containerWidth - size - paddingX * 2);
        const y = startY + Math.random() * (containerHeight - size - startY - paddingY);
        let safe = true;
        for (const p of placedPos) {
          const dx = (x + size/2) - (p.x + p.size/2), dy = (y + size/2) - (p.y + p.size/2);
          if (Math.sqrt(dx*dx + dy*dy) < (size/2 + p.size/2) * 0.85) { safe = false; break; }
        }
        if (safe) { placedPos.push({x, y, size}); return { x, y }; }
      }
      return { x: paddingX + Math.random() * (containerWidth - size - paddingX * 2), y: startY + Math.random() * (containerHeight - size - startY - paddingY) };
    }

    songs.forEach((song) => {
      const bubble = document.createElement('div'); bubble.className = 'bubble';
      bubble.style.width = song.size + 'px'; bubble.style.height = song.size + 'px';
      const pos = getSafePos(song.size); bubble.style.left = pos.x + 'px'; bubble.style.top = pos.y + 'px';
      
      const delay = Math.random() * 5, duration = 5 + Math.random() * 5;
      bubble.style.animationDuration = duration + 's'; bubble.style.animationDelay = '-' + delay + 's';

      const title = document.createElement('div'); title.className = 'title';
      let innerHtml = song.title.replace('\n', '<br>');
      if (song.contributor) innerHtml += `<span class="contributor">from ${song.contributor}</span>`;
      title.innerHTML = innerHtml; bubble.appendChild(title);

      bubble.addEventListener('click', (e) => {
        if (isBgmPlaying) pauseBGM();
        if (currentBubble) currentBubble.classList.remove('playing');
        bubble.classList.add('playing'); currentBubble = bubble;
        player.classList.add('active'); nowPlaying.innerText = song.title.replace('\n', ' ');
        contributorTag.innerText = song.contributor ? `FROM: ${song.contributor}` : '';
        audioElement.src = song.src; audioElement.play();

        const notes = ['✧', '✦', '·', '°'];
        for(let i=0; i<4; i++) {
          const note = document.createElement('div'); note.className = 'music-note'; note.innerText = notes[Math.floor(Math.random() * notes.length)];
          note.style.left = (e.clientX - 10 + Math.random()*20) + 'px'; note.style.top = (e.clientY - 10 + Math.random()*20) + 'px'; note.style.animationDuration = (1.5 + Math.random()) + 's';
          document.body.appendChild(note); setTimeout(() => note.remove(), 2000);
        }
      });
      container.appendChild(bubble);
    });
  }

  function playBGM() {
    bgmElement.play().then(() => {
      isBgmPlaying = true; bgmToggle.classList.remove('paused'); bgmText.innerText = 'BGM: If - Bread';
    }).catch(e => console.log('BGM auto-play prevented'));
  }
  function pauseBGM() {
    bgmElement.pause(); isBgmPlaying = false; bgmToggle.classList.add('paused'); bgmText.innerText = 'BGM PAUSED';
  }

  window.addEventListener('click', (e) => {
    if (e.target.closest('.bubble') || e.target.closest('#bgm-toggle') || e.target.closest('#player') || e.target.closest('.contribute-btn')) return;
    if (!hasUserInteracted) { hasUserInteracted = true; if (!isBubblePlaying) playBGM(); }
  }, { once: true });

  bgmToggle.addEventListener('click', (e) => {
    e.stopPropagation(); hasUserInteracted = true;
    if (isBgmPlaying) {
      pauseBGM();
    } else {
      if (isBubblePlaying) { audioElement.pause(); if (currentBubble) currentBubble.classList.remove('playing'); player.classList.remove('active'); isBubblePlaying = false; }
      playBGM();
    }
  });

  audioElement.addEventListener('ended', () => { if (currentBubble) currentBubble.classList.remove('playing'); nowPlaying.innerText = 'STANDBY'; isBubblePlaying = false; });
  audioElement.addEventListener('pause', () => { isBubblePlaying = false; });
  audioElement.addEventListener('play', () => { isBubblePlaying = true; });
</script>
</body>
</html>
